<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin | Sellix</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b0b0b;
            color: white;
        }

        .header {
            padding: 20px;
            background: #111;
            border-bottom: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title {
            font-size: 22px;
            color: rgb(0, 195, 0);
        }

        .container {
            padding: 30px;
        }

        .card {
            background: #151515;
            border: 1px solid #222;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn {
            background: red;
            color: white;
            padding: 8px 12px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
        }

        .btn:hover {
            background: darkred;
        }

        .info {
            font-size: 14px;
            color: #aaa;
        }

        .top-bar {
            margin-bottom: 20px;
            color: #888;
        }
        h2 {
            color: rgb(0, 195, 0);
        }
    </style>
</head>

<body>

<div class="header">
    <div class="title">⚙ Painel de Controle - Sellix</div>
    <div class="info">
        Admin: {{ user.username }}
    </div>
</div>

<div class="container">

    <div class="top-bar">
        Seja bem vindo, <span style="color: rgb(0, 195, 0);">{{ user.username }}</span>  
        | Controle total de usuários cadastrados no sistema
    </div>

    {% for u in usuarios %}

        <div class="card">
            <div>
                <strong>{{ u.username }}</strong><br>
                <span class="info">{{ u.email }}</span>
            </div>

            {% if user.is_superuser %}
                <form method="post" action="{% url 'deletar_usuario' u.id %}" onsubmit="return confirm('Deseja realmente remover este usuário?')">
                    {% csrf_token %}
                    <button type="submit" class="btn">Remover</button>
                </form>
            {% endif %}
        </div>

    {% endfor %}

</div>

</body>
</html>
