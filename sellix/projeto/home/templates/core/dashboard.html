{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ company.name }} | Dashboard</title>
    <link rel="icon" type="image/x-icon" sizes="32x32" href="{% static 'favicon.ico' %}">          
    <link rel="shortcut icon" href="{% static 'img/logo.png' %}">
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f5f5f5;
        }

        .header {
            background: rgb(0, 195, 0);
            color: rgb(54, 54, 54);
            padding: 20px;
        }

        .container {
            padding: 20px;
        }

        .card {
            background: gray;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
        }

        input, textarea {
            width: 98%;
            padding: 8px;
            margin: 5px 0;
        }

        button {
            background: rgb(0, 195, 0);
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 5px;
        }

        .post {
            background: white;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
        }
    </style>
</head>

<body>

<div class="header">
    <h1>{{ company.name }}</h1>
    <p>Desenvolvedor: 81 994317883</p>
</div>

<div class="container">

    <!-- 🛠 EMPRESA -->
    <div class="card">
        <h2>Sua empresa</h2>

        <form method="POST">
            {% csrf_token %}

            <label>Nome da empresa:</label>
            <input type="text" name="name" value="{{ company.name }}">

        </form>
    </div>

    <!-- 🧾 TABELA DINÂMICA -->
<div class="card">

    <h1>Tabela de produtos</h1>
    <form method="POST" action="{% url 'add_item' %}">
        {% csrf_token %}

        <label>Adicionar novo item:</label>
        <input type="text" name="text" placeholder="Adicionar item">

    <button type="submit">Adicionar</button>
    </form>
    <br>
    <table>
        <tr>
            <th>ID</th>
            <th>Texto</th>
        </tr>

        {% for item in items %}
        <tr>
            <td>{{ item.id }}</td>
            <td>{{ item.text }}</td>
        </tr>
        {% endfor %}
    </table>
</div>

</body>
</html>
