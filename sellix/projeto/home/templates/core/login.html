{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sellix | SAAS</title>

   <link rel="icon" type="image/x-icon" sizes="32x32" href="{% static 'img/favicon.ico' %}">
    <link rel="shortcut icon" href="{% static 'img/favicon.ico' %}">

    <script src="https://unpkg.com/lucide@latest"></script>


    <style>
        body {
            background: black;
            color: #fff;
            display: flex;
            font-family:'Inter', sans-serif;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }     
        .container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background:#0d0d0d;
            font-family:'Inter', sans-serif;
            color: white;
            height: 60vh;
            width: 350px;
            border:1px solid #1f1f1f;
            border-radius: 10px;
        }   
        input{
            width: 300px;
            padding:16px;
            border-radius:14px;
            border:1px solid #232323;
            background:#111;
            color:white;
            font-size:16px;
            outline:none;
            margin: 10px 0;
            transition:0.2s;
        }

        input:focus{
            border-color: rgb(0, 195, 0);
            box-shadow:0 0 0 4px rgba(173, 184, 180, 0.1);
        }
        p {
            font-family: 'VT323', monospace;
        }
        button {
            height: 4vh;
            width: 80%;
            border-radius: 5px;
            margin-top: 10px;
            background: rgb(0, 195, 0);
            border: none;
            box-shadow: 0px 4px 10px rgb(50, 50, 50);
            cursor: pointer;
            color: white;
        }
        button:hover {
            background: rgb(0, 152, 0);
            box-shadow: 0px 4px 10px rgb(30, 30, 30);
            height: 4vh;
            width: 85%;
        }
        a {
            color: rgb(0, 195, 0);
            text-decoration: none;
        }
        .container2 {
            background: rgb(54, 54, 54);
            padding: 10px;
            background: rgba(255, 0, 0, 0.304);
            border-radius: 5px;
            width: 80%;
            margin-top: 10px;
            border: solid rgba(255, 0, 0, 0.416);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <h1>Seja bem-vindo à <span style="color: rgb(0, 195, 0);">Sellix</span></h1> 

    <form method="POST">
        {% csrf_token %}
    <div class="container">
            <h1>Faça o <span style="color: rgb(0, 195, 0);">Login</span></h1>

            <input type="text" name="username" placeholder="Digite seu e-mail ou usuário" required>

            <input type="password" name="password" placeholder="Digite sua senha" required>
            {% if error %}
            <div class="container2">
                <p style="color:red;">{{ error }}</p>
            </div>
            {% endif %}
            <button>Entrar</button>
            <p>Ainda não tem uma conta? <a href="{% url 'cadastro' %}">Cadastre-se</a></p>
    </div>    
    </form>


</body>
</html>
