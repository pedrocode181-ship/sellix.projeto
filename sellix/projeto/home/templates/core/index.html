<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sellix Projeto</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #000000;
            color: white;
        }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-size: 50px;
            margin-bottom: 10px;
        }

        p {
            font-size: 18px;
            color: #cbd5e1;
            max-width: 600px;
        }

        .btn {
            margin-top: 20px;
            padding: 12px 24px;
            background: rgb(0, 195, 0);
            border: none;
            border-radius: 8px;
            color: white;
            cursor: pointer;
            text-decoration: none;
        }

        .btn:hover {
            background: rgb(0, 144, 0);
        }
    </style>
</head>

<body>

<div class="hero">
    <h1>Bem-vindo a <span style="color: rgb(0, 195, 0);">Sellix</span></h1>
    <p>Um projeto em desenvolvimento focado em ajudar pequenas empresas que estão comaçando agora com modulos de ajuda, graficos e muito mais.</p>

    <a class="btn" href="login/">Comece agora</a>
</div>

</body>
</html>
