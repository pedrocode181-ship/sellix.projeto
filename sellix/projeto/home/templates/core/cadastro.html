{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Sellix | SAAS</title>
  <link rel="icon" type="image/x-icon" sizes="32x32" href="{% static 'favicon.ico' %}">
    <link rel="shortcut icon" href="{% static 'favicon.ico' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:#050505;
      color:white;
      font-family:'Inter', sans-serif;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }

    .container{
      width:100%;
      max-width:420px;
      background:#0d0d0d;
      border:1px solid #1f1f1f;
      border-radius:24px;
      padding:40px;
      box-shadow:0 0 40px rgba(0,0,0,0.5);
    }

    .tag{
      color: rgb(0, 195, 0);
      font-size:14px;
      letter-spacing:3px;
      margin-bottom:12px;
      text-transform:uppercase;
    }

    h1{
      font-size:42px;
      margin-bottom:10px;
    }

    .subtitle{
      color:#8d8d8d;
      line-height:1.6;
      margin-bottom:32px;
    }

    form{
      display:flex;
      flex-direction:column;
      gap:18px;
    }

    .input-group{
      display:flex;
      flex-direction:column;
      gap:8px;
    }

    label{
      font-size:14px;
      color:#bdbdbd;
    }

    input{
      width:100%;
      padding:16px;
      border-radius:14px;
      border:1px solid #232323;
      background:#111;
      color:white;
      font-size:16px;
      outline:none;
      transition:0.2s;
    }

    input:focus{
      border-color: rgb(0, 195, 0);
      box-shadow:0 0 0 4px rgba(0,255,153,0.1);
    }

    button{
      margin-top:10px;
      padding:16px;
      border:none;
      border-radius:14px;
      background: rgb(0, 195, 0);
      color:#000;
      font-size:16px;
      font-weight:700;
      cursor:pointer;
      transition:0.2s;
    }

    button:hover{
      transform:translateY(-2px);
      opacity:0.9;
    }

    .footer{
      margin-top:22px;
      text-align:center;
      color:#777;
      font-size:14px;
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="tag">Cadastro</div>

    <h1>Entre agora</h1>

    <p class="subtitle">
      Cadastre seu nome e e-mail para acessar
      a plataforma.
    </p>

    <form method="POST">
      {% csrf_token %}

      <div class="input-group">
        <label>Nome</label>
        <input 
          type="text" 
          name="nome"
          placeholder="Digite seu nome"
          required
        />
      </div>

      <div class="input-group">
        <label>E-mail</label>
        <input 
          type="email" 
          name="gmail"
          placeholder="Digite seu e-mail"
          required
        />
      </div>

      <button type="submit">
        Criar cadastro
      </button>

    </form>

    <div class="footer">
      Seus dados estão protegidos.
    </div>

  </div>

</body>
</html>
