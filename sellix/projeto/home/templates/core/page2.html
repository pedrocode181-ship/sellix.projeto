            display: flex;

            color: white;
            height: 30vh;
            width: 400px;

        }
        .card {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgb(54, 54, 54);

            width: 160px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgb(54, 54, 54);
            margin-top: 10px;
            margin: 5px;
        }
        .card:hover {
            background: rgb(100, 100, 100);
            height: 12vh;
            width: 150px;
        }
    </style>
</head>
